name: ALEPE — Ingestão Mensal

# ATENÇÃO — sem schedule automático:
# A API PHP da ALEPE bloqueia IPs de datacenter (Azure/GitHub Actions).
# A ingestão só funciona via IP residencial BR (Mac local do editor).
# Use o launchd local (scripts/alepe-cron.sh + LaunchAgents/com.thebrinsider.alepe-mensal.plist)
# ou dispare manualmente via workflow_dispatch após rodar localmente para validação pontual.

on:
  workflow_dispatch:
    inputs:
      ano:
        description: "Ano a ingerir (ex: 2026). Vazio = ano atual."
        required: false
        default: ""
      meses:
        description: "Meses a ingerir, separados por espaço (ex: '4 5'). Vazio = mês anterior + corrente."
        required: false
        default: ""

jobs:
  ingerir:
    name: Ingerir verba indenizatória ALEPE
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Calcular ano/meses a ingerir
        id: periodo
        run: |
          INPUT_ANO="${{ github.event.inputs.ano }}"
          INPUT_MESES="${{ github.event.inputs.meses }}"

          if [ -n "$INPUT_ANO" ]; then
            ANO="$INPUT_ANO"
          else
            ANO=$(date +%Y)
          fi

          if [ -n "$INPUT_MESES" ]; then
            MESES="$INPUT_MESES"
            echo "Período explícito: $ANO meses=[$MESES]"
          else
            CURRENT_MES=$(date +%-m)
            if [ "$CURRENT_MES" -eq 1 ]; then
              MESES="1"
            else
              PREV_MES=$((CURRENT_MES - 1))
              MESES="$PREV_MES $CURRENT_MES"
            fi
            echo "Período automático: $ANO/[$MESES]"
          fi

          echo "ano=$ANO"   >> "$GITHUB_OUTPUT"
          echo "meses=$MESES" >> "$GITHUB_OUTPUT"
          echo "label=$ANO/[$(echo $MESES | tr ' ' ',')]" >> "$GITHUB_OUTPUT"

      - name: Atualizar lista de deputados
        # A API PHP da ALEPE bloqueia IPs de datacenter (como Azure/GitHub Actions).
        # O step falha com "fetch failed" em runners remotos mas funciona localmente.
        # Não abortar o job — as despesas podem ser ingeridas mesmo sem atualizar deputados.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run ingestao-alepe:deputados

      - name: Ingerir despesas — ${{ steps.periodo.outputs.label }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm run ingestao-alepe -- \
            ${{ steps.periodo.outputs.ano }} \
            ${{ steps.periodo.outputs.meses }}

      - name: Atualizar cruzamento ALEPE × Câmara × ALESP
        # Mesmo motivo do ALESP: statement_timeout do Supabase não pode ser sobrescrito
        # via RPC. O refresh real roda no launchd local (refresh-fornecedores-mensal.sh).
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/refresh_fornecedores_intersetados" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Refresh fornecedores_intersetados → HTTP $STATUS"

      - name: Resumo no log
        if: always()
        run: |
          echo "### ALEPE Ingestão — ${{ steps.periodo.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Período | ${{ steps.periodo.outputs.label }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Fonte: API PHP ALEPE (4 endpoints). Idempotente via UNIQUE constraint." >> "$GITHUB_STEP_SUMMARY"
